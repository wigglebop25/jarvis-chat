[mypy]
# Relax strictness for local development CI: avoid failing on third-party stubs
ignore_missing_imports = True
follow_imports = silent
check_untyped_defs = False
disallow_untyped_defs = False
disallow_untyped_globals = False
warn_unused_ignores = True
# Limit checks to the core package to avoid third-party/tests noise
files = src/chat_agent
